name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Ensure iOS Simulator Runtime
        run: |
          set -euo pipefail
          # Install the latest iOS simulator runtime if none are available
          if ! xcrun simctl list runtimes available | grep -q "com.apple.CoreSimulator.SimRuntime.iOS"; then
            echo "No available iOS runtime found, installing..."
            xcodebuild -downloadPlatform iOS
          fi
          # Create a simulator if the preferred device is missing
          DEVICE_NAME="iPhone 16 Pro"
          DEVICE_TYPE_ID="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
          if ! xcrun simctl list devices available | grep -w "$DEVICE_NAME" | grep -qv "Max"; then
            RUNTIME=$(xcrun simctl list runtimes available | grep "com.apple.CoreSimulator.SimRuntime.iOS" | tail -1 | awk '{print $NF}')
            if [ -z "$RUNTIME" ]; then
              echo "::error::No iOS simulator runtime available"
              exit 1
            fi
            echo "Creating $DEVICE_NAME (type: $DEVICE_TYPE_ID) with runtime $RUNTIME"
            xcrun simctl create "$DEVICE_NAME" "$DEVICE_TYPE_ID" "$RUNTIME"
          fi
          # Verify the exact device exists
          if ! xcrun simctl list devices available | grep -w "$DEVICE_NAME" | grep -qv "Max"; then
            echo "::error::$DEVICE_NAME simulator not available after setup"
            exit 1
          fi
          echo "$DEVICE_NAME simulator is available"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.swift', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project Lazyflow.xcodeproj \
            -scheme Lazyflow \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Run Unit Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Lazyflow.xcodeproj \
            -scheme Lazyflow \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:LazyflowTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --report junit --output test-results.xml

      - name: Extract Coverage Report
        if: always()
        continue-on-error: true
        run: |
          if [ -d "TestResults.xcresult" ]; then
            # Extract coverage percentage using xccov
            xcrun xccov view --report --only-targets TestResults.xcresult > coverage-report.txt || true

            # Parse overall coverage for the Lazyflow target
            COVERAGE=$(grep "Lazyflow" coverage-report.txt | awk '{print $NF}' | head -1 || true)
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Overall coverage: ${COVERAGE:-N/A}**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat coverage-report.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"

            echo "::notice::Code coverage: ${COVERAGE:-N/A}"
          else
            echo "::warning::No test results found — coverage report skipped"
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage-report.txt
          retention-days: 30

      - name: Upload xcresult Bundle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xcresult-bundle
          path: TestResults.xcresult
          retention-days: 14

  ui-tests:
    runs-on: macos-15
    timeout-minutes: 60
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Ensure iOS Simulator Runtime
        run: |
          set -euo pipefail
          # Install the latest iOS simulator runtime if none are available
          if ! xcrun simctl list runtimes available | grep -q "com.apple.CoreSimulator.SimRuntime.iOS"; then
            echo "No available iOS runtime found, installing..."
            xcodebuild -downloadPlatform iOS
          fi
          # Create a simulator if the preferred device is missing
          DEVICE_NAME="iPhone 16 Pro"
          DEVICE_TYPE_ID="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
          if ! xcrun simctl list devices available | grep -w "$DEVICE_NAME" | grep -qv "Max"; then
            RUNTIME=$(xcrun simctl list runtimes available | grep "com.apple.CoreSimulator.SimRuntime.iOS" | tail -1 | awk '{print $NF}')
            if [ -z "$RUNTIME" ]; then
              echo "::error::No iOS simulator runtime available"
              exit 1
            fi
            echo "Creating $DEVICE_NAME (type: $DEVICE_TYPE_ID) with runtime $RUNTIME"
            xcrun simctl create "$DEVICE_NAME" "$DEVICE_TYPE_ID" "$RUNTIME"
          fi
          # Verify the exact device exists
          if ! xcrun simctl list devices available | grep -w "$DEVICE_NAME" | grep -qv "Max"; then
            echo "::error::$DEVICE_NAME simulator not available after setup"
            exit 1
          fi
          echo "$DEVICE_NAME simulator is available"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.swift', '**/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      - name: Run UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Lazyflow.xcodeproj \
            -scheme Lazyflow \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:LazyflowUITests \
            -resultBundlePath UITestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Upload UI Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 14
