name: Re-record Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to re-record snapshots on'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  record-snapshots:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Ensure iOS Simulator Runtime
        run: |
          set -euo pipefail
          if ! xcrun simctl list runtimes available | grep -q "com.apple.CoreSimulator.SimRuntime.iOS"; then
            echo "No available iOS runtime found, installing..."
            xcodebuild -downloadPlatform iOS
          fi
          DEVICE_NAME="iPhone 16 Pro"
          DEVICE_TYPE_ID="com.apple.CoreSimulator.SimDeviceType.iPhone-16-Pro"
          if ! xcrun simctl list devices available | grep -w "$DEVICE_NAME" | grep -qv "Max"; then
            RUNTIME=$(xcrun simctl list runtimes available | grep "com.apple.CoreSimulator.SimRuntime.iOS" | tail -1 | awk '{print $NF}')
            if [ -z "$RUNTIME" ]; then
              echo "::error::No iOS simulator runtime available"
              exit 1
            fi
            xcrun simctl create "$DEVICE_NAME" "$DEVICE_TYPE_ID" "$RUNTIME"
          fi

      - name: Re-record Snapshot References
        run: |
          # Record mode tests always "fail" by design (swift-snapshot-testing
          # records the image then fails so you know to re-run).  We allow
          # the test command to exit non-zero and verify success by checking
          # that snapshot files were actually written.
          SNAPSHOT_RECORD=true xcodebuild test \
            -project Lazyflow.xcodeproj \
            -scheme Lazyflow \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro' \
            -only-testing:LazyflowTests \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | xcpretty || true
          if ! ls LazyflowTests/Snapshots/__Snapshots__/**/*.png &>/dev/null; then
            echo "::error::No snapshot files found — build may have failed"
            exit 1
          fi

      - name: Commit Updated References
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- 'LazyflowTests/Snapshots/__Snapshots__/'; then
            echo "No snapshot changes detected"
          else
            git add 'LazyflowTests/Snapshots/__Snapshots__/'
            git commit -m "test(snapshots): re-record references on CI"
            git push
          fi
